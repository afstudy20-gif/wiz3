<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Off-white background -->
  <rect width="200" height="200" fill="#eef0f4"/>

  <!-- Subtle grid lines -->
  <line x1="100" y1="4" x2="100" y2="196" stroke="#d0d5de" stroke-width="0.6" opacity="0.5"/>
  <line x1="4" y1="100" x2="196" y2="100" stroke="#d0d5de" stroke-width="0.6" opacity="0.5"/>

  <!-- Outer accent dots -->
  <circle cx="100" cy="8"   r="4.5" fill="#c9a84c" opacity="0.9"/>
  <circle cx="192" cy="72"  r="5.5" fill="#4fa8a0" opacity="0.9"/>
  <circle cx="182" cy="142" r="4"   fill="#7a9fba" opacity="0.7"/>
  <circle cx="16"  cy="78"  r="5"   fill="#7a9fba" opacity="0.7"/>
  <circle cx="28"  cy="148" r="4"   fill="#8aacbf" opacity="0.6"/>

  <!-- Outer ring – dark blue border -->
  <circle cx="100" cy="100" r="88" fill="#4a6d8e"/>
  <!-- Inner ring highlight -->
  <circle cx="100" cy="100" r="80" fill="#6b8fac"/>
  <!-- White disc -->
  <circle cx="100" cy="100" r="73" fill="white"/>

  <!-- ── Bar chart ── -->
  <!-- Axis lines -->
  <line x1="37" y1="38" x2="37" y2="130" stroke="#1e3a5f" stroke-width="2.2"/>
  <line x1="37" y1="130" x2="128" y2="130" stroke="#1e3a5f" stroke-width="2.2"/>

  <!-- Bars (left-to-right: short → medium → tall → tallest) -->
  <rect x="42"  y="100" width="14" height="30" fill="#1e4060" rx="2"/>
  <rect x="60"  y="80"  width="14" height="50" fill="#2a7a8e" rx="2"/>
  <rect x="78"  y="62"  width="14" height="68" fill="#368fa0" rx="2"/>
  <rect x="96"  y="48"  width="14" height="82" fill="#1e6b8a" rx="2"/>
  <rect x="114" y="58"  width="14" height="72" fill="#2a9aaa" rx="2"/>

  <!-- ── Gold trend arrow ── -->
  <polyline
    points="44,118 63,95 82,108 104,70 131,44"
    fill="none" stroke="#c9a84c" stroke-width="3.8"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Nodes on trend line -->
  <circle cx="44"  cy="118" r="4.5" fill="#c9a84c"/>
  <circle cx="63"  cy="95"  r="4.5" fill="#c9a84c"/>
  <circle cx="82"  cy="108" r="4.5" fill="#c9a84c"/>
  <circle cx="104" cy="70"  r="5.5" fill="#c9a84c"/>
  <!-- Arrow head -->
  <polygon points="131,44 119,52 124,60" fill="#c9a84c"/>

  <!-- ── Brain (bottom half of inner circle) ── -->
  <!-- Left hemisphere outline -->
  <path d="M68,162 C50,156 42,142 44,130
           C46,119 56,115 62,118
           C59,108 64,99 73,99
           C71,91 78,86 85,88
           C88,81 96,79 100,83"
        fill="none" stroke="#1e3a5f" stroke-width="2.3" stroke-linecap="round"/>
  <!-- Right hemisphere outline -->
  <path d="M100,83 C104,79 112,81 115,88
           C122,86 129,91 127,99
           C136,99 141,108 138,118
           C144,115 154,119 156,130
           C158,142 150,156 132,162"
        fill="none" stroke="#1e3a5f" stroke-width="2.3" stroke-linecap="round"/>
  <!-- Bottom of brain -->
  <path d="M68,162 C76,168 90,170 100,170
           C110,170 124,168 132,162"
        fill="none" stroke="#1e3a5f" stroke-width="2.3" stroke-linecap="round"/>
  <!-- Centre sulcus -->
  <line x1="100" y1="83" x2="100" y2="170"
        stroke="#1e3a5f" stroke-width="1.4" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Neural network nodes -->
  <circle cx="72"  cy="130" r="3.2" fill="#1e3a5f"/>
  <circle cx="80"  cy="116" r="3.2" fill="#1e3a5f"/>
  <circle cx="88"  cy="147" r="3.2" fill="#1e3a5f"/>
  <circle cx="100" cy="135" r="3.2" fill="#1e3a5f"/>
  <circle cx="88"  cy="158" r="3.2" fill="#1e3a5f"/>
  <circle cx="112" cy="130" r="3.2" fill="#1e3a5f"/>
  <circle cx="120" cy="116" r="3.2" fill="#1e3a5f"/>
  <circle cx="112" cy="148" r="3.2" fill="#1e3a5f"/>
  <circle cx="100" cy="158" r="3.2" fill="#1e3a5f"/>

  <!-- Neural connections -->
  <g stroke="#1e3a5f" stroke-width="1.1" opacity="0.55">
    <line x1="72"  y1="130" x2="80"  y2="116"/>
    <line x1="80"  y1="116" x2="100" y2="135"/>
    <line x1="100" y1="135" x2="88"  y2="147"/>
    <line x1="88"  y1="147" x2="88"  y2="158"/>
    <line x1="88"  y1="158" x2="100" y2="158"/>
    <line x1="100" y1="135" x2="112" y2="130"/>
    <line x1="112" y1="130" x2="120" y2="116"/>
    <line x1="112" y1="130" x2="112" y2="148"/>
    <line x1="112" y1="148" x2="100" y2="158"/>
    <line x1="72"  y1="130" x2="88"  y2="147"/>
  </g>
</svg>
