name: security-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches new CVEs in pinned deps
    - cron: "0 6 * * 1"

jobs:
  python:
    name: Python (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] pip-audit
      - name: bandit — static security analysis
        run: bandit -r backend --severity-level medium --confidence-level medium --exclude backend/services/code_runner_child.py,backend/services/sandbox.py
      - name: pip-audit — dependency CVE check
        run: pip-audit --requirement backend/requirements.txt --strict

  semgrep:
    name: Semgrep (OWASP Top 10)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: semgrep scan
        run: |
          semgrep scan \
            --config p/python \
            --config p/typescript \
            --config p/owasp-top-ten \
            --exclude 'frontend/dist/**' \
            --exclude 'frontend/node_modules/**' \
            --error
        env:
          # SEMGREP_APP_TOKEN is optional; without it `semgrep ci` falls back
          # to public rulesets only — that is fine for OSS projects.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  frontend:
    name: Frontend (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: npm audit — high+ severity gate
        run: npm audit --audit-level=high

  secrets-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
